# Alertmanager configuration for the local Docker Compose stack.
#
# This is a self-contained config that starts cleanly without external secret
# files. The previous version referenced smtp_auth_password_file,
# pagerduty service_key_file, and pagerduty_key paths that are not mounted in
# compose, which makes Alertmanager fail validation at startup.
#
# For production, supply real SMTP/PagerDuty credentials (the Kubernetes
# Alertmanager in kubernetes/monitoring/alertmanager.yaml is configured
# separately via its own ConfigMap and secret mounts).

global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "cluster", "service"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "default"
  routes:
    - match:
        severity: critical
      receiver: "critical-alerts"
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: "warning-alerts"

receivers:
  # Local default: alerts are visible in the Alertmanager UI (no external
  # delivery is configured so the stack starts without credentials).
  - name: "default"
  - name: "critical-alerts"
  - name: "warning-alerts"

inhibit_rules:
  # A firing critical alert silences a warning for the same alert/service.
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname", "cluster", "service"]
