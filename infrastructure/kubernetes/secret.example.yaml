# ChainFinity Kubernetes Secrets - Example
# NEVER commit real values. Use Sealed Secrets, Vault, or AWS Secrets Manager in production.
# Generate values with: openssl rand -base64 32

---
apiVersion: v1
kind: Secret
metadata:
  name: chainfinity-db-secret
  namespace: chainfinity
  labels:
    app.kubernetes.io/name: chainfinity
    app.kubernetes.io/component: database
type: Opaque
stringData:
  database-url: "postgresql+asyncpg://chainfinity:CHANGE_ME@postgres.chainfinity.svc.cluster.local:5432/chainfinity"
  db-host: "postgres.chainfinity.svc.cluster.local"
  db-username: "chainfinity"
  db-password: "CHANGE_ME"

---
apiVersion: v1
kind: Secret
metadata:
  name: chainfinity-redis-secret
  namespace: chainfinity
  labels:
    app.kubernetes.io/name: chainfinity
    app.kubernetes.io/component: cache
type: Opaque
stringData:
  redis-url: "redis://:CHANGE_ME@chainfinity-redis.chainfinity.svc.cluster.local:6379/0"
  redis-password: "CHANGE_ME"

---
apiVersion: v1
kind: Secret
metadata:
  name: chainfinity-app-secret
  namespace: chainfinity
  labels:
    app.kubernetes.io/name: chainfinity
    app.kubernetes.io/component: application
type: Opaque
stringData:
  jwt-secret: "CHANGE_ME_MIN_32_CHARS"
  encryption-key: "CHANGE_ME_EXACTLY_32_CHARS______"
  api-key: "CHANGE_ME"

---
apiVersion: v1
kind: Secret
metadata:
  name: chainfinity-registry-secret
  namespace: chainfinity
  labels:
    app.kubernetes.io/name: chainfinity
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: '{"auths":{"registry.chainfinity.com":{"username":"CHANGE_ME","password":"CHANGE_ME","auth":"CHANGE_ME_BASE64"}}}'

---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-secret
  namespace: chainfinity-monitoring
  labels:
    app.kubernetes.io/name: grafana
type: Opaque
stringData:
  admin-user: "admin"
  admin-password: "CHANGE_ME_STRONG_PASSWORD"
